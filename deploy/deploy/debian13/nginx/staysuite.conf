# =============================================================================
# StaySuite HospitalityOS - Nginx Reverse Proxy Configuration
# =============================================================================
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/
#
# Usage:
#   sudo cp staysuite.conf /etc/nginx/sites-available/staysuite
#   sudo ln -sf /etc/nginx/sites-available/staysuite /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Requirements:
#   - SSL certificate from Let's Encrypt (certbot)
#   - Next.js app running on port 3000
#   - Mini-services: realtime (3003), availability (3002), freeradius (3010)
# =============================================================================

# --------------------------------------------------------------------------
# Upstream definitions for backend services
# --------------------------------------------------------------------------
upstream staysuite_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream staysuite_realtime {
    server 127.0.0.1:3003;
    keepalive 32;
}

upstream staysuite_availability {
    server 127.0.0.1:3002;
    keepalive 32;
}

upstream staysuite_freeradius {
    server 127.0.0.1:3010;
    keepalive 32;
}

# --------------------------------------------------------------------------
# Rate limiting zones
# --------------------------------------------------------------------------
# General API rate limit: 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# WebSocket connections: 5 per second per IP
limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=5r/s;
# Login/auth endpoints: 3 per second per IP (brute-force protection)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/s;

# --------------------------------------------------------------------------
# HTTP -> HTTPS Redirect + ACME Challenge
# --------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;

    # Let's Encrypt ACME challenge endpoint
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --------------------------------------------------------------------------
# Main HTTPS Server
# --------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;

    # =========================================================================
    # SSL Configuration
    # =========================================================================
    # Certificates (managed by certbot -- let's encrypt)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # SSL Protocol & Cipher Hardening (Mozilla Intermediate profile)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Session settings for performance
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (verify certificate status without contacting CA)
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;
    resolver 1.1.1.1 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Diffie-Hellman parameters (generate: openssl dhparam -out /etc/nginx/dhparam.pem 2048)
    # ssl_dhparam /etc/nginx/dhparam.pem;

    # =========================================================================
    # Security Headers
    # =========================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Content Security Policy (adjust as needed for your app)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # HTTP Strict Transport Security (enable after testing - 2 year max-age)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # =========================================================================
    # Gzip Compression
    # =========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        image/x-icon
        font/opentype
        font/ttf
        font/woff
        font/woff2;

    # =========================================================================
    # Logging
    # =========================================================================
    access_log /var/log/nginx/staysuite_access.log;
    error_log  /var/log/nginx/staysuite_error.log warn;

    # =========================================================================
    # Request Body Limits
    # =========================================================================
    client_max_body_size 50m;     # File upload limit
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # =========================================================================
    # Timeouts
    # =========================================================================
    proxy_connect_timeout 60s;
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;

    # =========================================================================
    # Main Application Proxy (Next.js on port 3000)
    # =========================================================================
    location / {
        proxy_pass http://staysuite_app;
        proxy_http_version 1.1;

        # WebSocket support for Next.js HMR and Socket.IO
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Disable buffering for streaming/real-time responses
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # =========================================================================
    # Next.js API Routes (with rate limiting)
    # =========================================================================
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://staysuite_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints with stricter rate limiting
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://staysuite_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================================================
    # Next.js Static Assets (with long-term caching)
    # =========================================================================
    location /_next/static/ {
        proxy_pass http://staysuite_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
        access_log off;
    }

    # Static files in /public
    location /static/ {
        proxy_pass http://staysuite_app;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Favicon and robots.txt
    location = /favicon.ico {
        proxy_pass http://staysuite_app;
        access_log off;
        log_not_found off;
    }
    location = /robots.txt {
        proxy_pass http://staysuite_app;
        access_log off;
        log_not_found off;
    }

    # =========================================================================
    # WebSocket Proxies for Mini-Services
    # =========================================================================

    # Realtime service WebSocket (notifications, live updates)
    location /socket.io/realtime {
        limit_req zone=ws_limit burst=10 nodelay;
        proxy_pass http://staysuite_realtime/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Availability service WebSocket (inventory, rates)
    location /socket.io/availability {
        limit_req zone=ws_limit burst=10 nodelay;
        proxy_pass http://staysuite_availability/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # FreeRADIUS management WebSocket
    location /socket.io/freeradius {
        limit_req zone=ws_limit burst=10 nodelay;
        proxy_pass http://staysuite_freeradius/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # =========================================================================
    # Security: Block sensitive paths
    # =========================================================================
    # Block hidden files/directories (except .well-known for ACME)
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to Prisma/DB internals
    location ~* /(prisma|\.db|\.sqlite) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block common attack paths
    location ~* /(wp-admin|wp-login|xmlrpc|phpmyadmin|adminer) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # =========================================================================
    # Health Check Endpoint (for monitoring/load balancers)
    # =========================================================================
    location /api/health {
        proxy_pass http://staysuite_app;
        proxy_http_version 1.1;
        access_log off;
    }
}

# --------------------------------------------------------------------------
# WebSocket connection upgrade mapping
# Must be defined at http{} context level, or include via nginx.conf
# Add this to /etc/nginx/nginx.conf inside the http { } block:
#
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }
# --------------------------------------------------------------------------
